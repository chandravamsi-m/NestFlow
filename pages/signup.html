<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | NestFlow</title>
    
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../assets/js/tailwind-config.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300 min-h-screen flex items-center justify-center p-4">

    <!-- Top Corner Actions -->
    <div class="absolute top-6 right-6 flex items-center gap-4">
        <button class="theme-toggle p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
            <i data-lucide="moon" class="dark:hidden"></i>
            <i data-lucide="sun" class="hidden dark:block"></i>
        </button>
        <button class="rtl-toggle font-bold text-sm hover:text-primary-500">RTL</button>
    </div>

    <!-- Auth Card -->
    <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl p-8 md:p-10 w-full max-w-xl border border-slate-100 dark:border-slate-700 my-8">
        
        <div class="flex justify-center mb-8">
            <a href="../index.html" class="flex items-center gap-2 group">
                <div class="w-12 h-12 rounded-xl bg-primary-500 flex items-center justify-center text-white shadow-lg shadow-primary-500/30">
                    <i data-lucide="home"></i>
                </div>
                <span class="font-heading font-bold text-3xl tracking-tight text-slate-900 dark:text-white">Nest<span class="text-primary-500">Flow</span></span>
            </a>
        </div>

        <h2 class="text-2xl font-bold font-heading text-center mb-2">Create an Account</h2>
        <p class="text-slate-500 text-center mb-8">Join NestFlow to manage or discover properties.</p>

        <!-- Role Selection -->
        <div class="flex p-1 bg-slate-100 dark:bg-slate-900 rounded-xl mb-8">
            <button class="w-1/2 py-2 rounded-lg bg-white dark:bg-slate-800 shadow text-sm font-bold transition-all">I am a Tenant</button>
            <button class="w-1/2 py-2 rounded-lg text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 text-sm font-medium transition-all">I am an Owner</button>
        </div>

        <form class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-semibold mb-2">First Name</label>
                    <input type="text" placeholder="John" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-primary-500 transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Last Name</label>
                    <input type="text" placeholder="Doe" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-primary-500 transition-colors">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2">Email Address</label>
                <input type="email" placeholder="name@example.com" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-primary-500 transition-colors">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-semibold mb-2">Password</label>
                    <div class="relative">
                        <input type="password" placeholder="••••••••" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-primary-500 transition-colors">
                        <button type="button" class="absolute right-4 top-3 text-slate-400 hover:text-slate-600"><i data-lucide="eye" class="w-5 h-5"></i></button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Confirm Password</label>
                    <div class="relative">
                        <input type="password" placeholder="••••••••" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-primary-500 transition-colors">
                        <button type="button" class="absolute right-4 top-3 text-slate-400 hover:text-slate-600"><i data-lucide="eye" class="w-5 h-5"></i></button>
                    </div>
                </div>
            </div>

            <div class="flex items-start gap-2 pt-2 text-sm">
                <input type="checkbox" class="mt-1 rounded text-primary-500 focus:ring-primary-500 cursor-pointer">
                <span class="text-slate-500">I agree to the <a href="#" class="text-primary-500 hover:underline">Terms & Conditions</a> and <a href="#" class="text-primary-500 hover:underline">Privacy Policy</a></span>
            </div>

            <button type="button" class="w-full bg-primary-500 hover:bg-primary-600 text-white font-bold rounded-xl py-3.5 transition-colors shadow-lg shadow-primary-500/30">
                Create Account
            </button>
        </form>

        <p class="text-center text-slate-500 mt-8 text-sm">
            Already have an account? <a href="login.html" class="font-bold text-primary-500 hover:text-primary-600">Sign In</a>
        </p>
    </div>

    <script>lucide.createIcons();</script>
    <script src="../assets/js/main.js"></script>
</body>
</html>
